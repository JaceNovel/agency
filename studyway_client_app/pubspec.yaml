name: studyway_client
description: StudyWay — Super-app d'accompagnement étudiant international
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # HTTP & API
  dio: ^5.4.3+1
  retrofit: ^4.1.0

  # Secure storage
  flutter_secure_storage: ^9.0.0

  # Firebase & Notifications
  firebase_core: ^3.2.0
  firebase_messaging: ^15.0.3
  flutter_local_notifications: ^17.1.2

  # UI & Design
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2
  shimmer: ^3.0.0
  fl_chart: ^0.68.0
  intl: ^0.19.0
  timeago: ^3.6.1
  image_picker: ^1.1.2
  file_picker: ^8.0.6
  open_file: ^3.3.2
  url_launcher: ^6.3.0
  share_plus: ^9.0.0

  # Auth & Security
  local_auth: ^2.3.0
  pin_input_text_field: ^4.1.0

  # Storage
  shared_preferences: ^2.3.1
  path_provider: ^2.1.3

  # Utils
  uuid: ^4.4.0
  equatable: ^2.0.5
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  logger: ^2.3.0
  connectivity_plus: ^6.0.3
  package_info_plus: ^8.0.0
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  retrofit_generator: ^9.6.0

flutter:
  uses-material-design: true
